spring.application.name=john
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_POOL_1_PORT}/${POSTGRES_POOL_1_DB}?sslmode=${POSTGRES_SSLMODE}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.flyway.baseline-on-migrate=true
spring.kafka.bootstrap-servers=${KAFKA_HOST}:${KAFKA_PORT}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.animalhotels.john
spring.kafka.consumer.properties.spring.json.value.default.type=com.animalhotels.john.kafka.listener.PhotoChangedEvent
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.jpa.hibernate.naming.physical-strategy=com.animalhotels.john.JohnNamingStrategy
spring.kafka.listener.shutdown-timeout=30s
